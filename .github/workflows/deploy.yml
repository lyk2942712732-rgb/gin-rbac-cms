name: CI/CD Pipeline (构建与部署解耦版)

on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # 🏭 第一阶段：在 GitHub 上编译并打包镜像
  # ==========================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 1. 拉取最新代码
        uses: actions/checkout@v3

      - name: 🐹 2. 配置 Go 编译环境
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: 📦 3. 编译检查 (防线)
        run: |
          go mod tidy
          go build -v ./...
        
      - name: 📝 4. 自动生成 Swagger 接口文档
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          $(go env GOPATH)/bin/swag init

      - name: 🔑 5. 登录阿里云容器镜像服务 (ACR)
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: 🐳 6. 构建并推送 Docker 镜像 (利用 GitHub 极速网络)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 格式: registry.<地域>.aliyuncs.com/<命名空间>/<仓库名>:latest
          tags:   ${{ secrets.ACR_REGISTRY }}/my-company-apps/backend-api:latest

  # ==========================================
  # 🚀 第二阶段：通知服务器拉取最新镜像并重启
  # ==========================================
  deploy:
    needs: build-and-push  # 确保只有第一阶段成功，才会执行部署
    runs-on: ubuntu-latest
    steps:
      - name: 🚢 7. 登录服务器并自动部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. 登录私有镜像库 (确保服务器有权限拉取)
            docker login --username=${{ secrets.ACR_USERNAME }} --password=${{ secrets.ACR_PASSWORD }} ${{ secrets.ACR_REGISTRY }}
            
            cd /path/to/your/project
            # 2. 仅更新编排文件 (不需要在服务器上编译源码了)
            git pull origin main 
            
            # 3. 强制拉取最新镜像并平滑重启服务 (去掉了 --build 参数)
            docker compose pull
            docker compose up -d
            
            # 4. (可选) 清理悬空的旧镜像，防止挤爆服务器硬盘
            docker image prune -f