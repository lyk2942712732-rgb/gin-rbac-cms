name: CI/CD Pipeline (完整企业私有版)

on:
  push:
    branches:
      - main

jobs:
  build-test-and-deploy:
    runs-on: self-hosted 
    
    steps:
      # ==========================================
      # 🛡️ CI 阶段：持续集成 (安检门)
      # ==========================================
      - name: 📥 1. 拉取最新代码
        uses: actions/checkout@v3

      - name: 🐹 2. 配置 Go 编译环境
        uses: actions/setup-go@v4
        with:
          go-version: '1.26' # 保持与你项目一致

      - name: 📦 3. 下载依赖与编译检查 (核心防线)
        run: |
          go mod tidy
          # 尝试编译整个项目，如果有语法错误，流水线会在这里亮红灯并直接终止，绝不会执行后续部署！
          go build -v ./...
        
      - name: 📝 4. 自动生成最新 Swagger 接口文档
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          $(go env GOPATH)/bin/swag init

      # ==========================================
      # 🚀 CD 阶段：持续部署 (上线)
      # ==========================================
      - name: 🚢 5. 构建 Docker 镜像并平滑重启服务
        # 只有上面的 1~4 步全部绿灯通过，才会执行这一步
        run: |
          docker compose up -d --build