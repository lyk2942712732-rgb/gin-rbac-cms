name: CI/CD Pipeline (私有化版)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    # 核心魔法：告诉 GitHub，不要用你的公网机器，用我刚刚注册的这台名叫 self-hosted 的特工！
    runs-on: self-hosted 
    
    steps:
      - name: 📥 拉取最新代码
        uses: actions/checkout@v3

      - name: 🚀 编译并平滑重启服务
        run: |
          # 因为是 self-hosted，这个脚本其实是直接在你的阿里云服务器的 /home/github-runner/actions-runner/_work/... 目录下执行的！
          # 我们只需要直接敲 docker 命令就行了，没有任何密码泄露的风险！
          
          # 1. 确保服务器的 docker 镜像能顺利编译并后台运行
          docker compose up -d --build